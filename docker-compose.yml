version: '3.8'

services:
  backend:
    build: ./geo-backend
    ports:
      - "8000:8000"
    environment:
      - NEWSDATA_URL=https://newsdata.io/api/1/latest
      - NEWSDATA_APIKEY=${NEWSDATA_APIKEY}
      - GDELT_URL=https://api.gdeltproject.org/api/v2/context/context
      - CACHE_TTL_SECONDS=1200
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./geo-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./geo-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./geo-frontend:/app
      - /app/node_modules
    command: npm start
    restart: unless-stopped
    depends_on:
      - backend

networks:
  default:
    name: geopolitical-network
